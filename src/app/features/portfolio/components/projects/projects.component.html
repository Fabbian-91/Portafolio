<section id="proyectos"
  class="hero-section w-full min-h-[200px] flex flex-col items-start justify-center px-6 lg:px-20 pt-2 pb-4 gap-4 text-left">
  <div class="w-full">
    <div class="w-full lg:w-[98%] flex flex-row">
      <h1 class="text-2xl md:text-2xl lg:text-3xl font-bold flex items-center gap-3 mb-10">
        <i data-lucide="star" class="w-7 h-7 text-blue-500"></i>
        Proyectos
      </h1>

      <div class="hidden md:flex flex-1 justify-end">
        <a href="https://github.com/Fabbian-91?tab=repositories" class="personalizado-borde flex items-center gap-2">
          Ver todos los proyectos
          <i data-lucide="arrow-right" width="28" height="28" class="text-blue-500"></i>
        </a>
      </div>
    </div>

    <div class="w-full flex flex-col lg:flex-row gap-5 justify-center">
      @for (project of projects; track project.title) {
      <div class="card bg-base-100 w-full lg:w-[520px] shadow-sm">
        <figure>
          <img [src]="project.imageUrl" [alt]="project.title" />
        </figure>

        <div class="card-body">
          <h2 class="card-title">{{ project.title }}</h2>
          <p>{{ project.description }}</p>

          <div class="card-actions justify-end">
            <a [href]="project.url" target="_blank" class="btn btn-primary">
              Ver proyecto
            </a>
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</section>
